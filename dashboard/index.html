<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="home-header">
        <h1>espbench</h1>
    </header>

    <main>
        <div id="cards-container" class="cards-grid"></div>
        <div id="empty-state" class="empty-state hidden">No hay dispositivos conectados</div>
    </main>

    <script>
        function formatTimestamp(iso) {
            if (!iso) return 'Nunca';
            // "2026-06-23T17:22:52" → "2026-06-23 17:22:52"
            return iso.replace('T', ' ');
        }

        function buildCard(device) {
            const title = device.chip_id != null ? device.chip_id : device.tty_name;
            const statusClass = device.status === 'RUNNING' ? 'badge-running' : 'badge-down';
            const lastFlash = formatTimestamp(device.last_flash_ts);

            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="card-title">${escapeHtml(title)}</span>
                    <span class="badge ${statusClass}">${escapeHtml(device.status)}</span>
                </div>
                <div class="card-body">
                    <div class="card-row">
                        <span class="card-label">Puerto TCP:</span>
                        <span class="card-value">${escapeHtml(String(device.port_tcp))}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">Último flash:</span>
                        <span class="card-value">${escapeHtml(lastFlash)}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">TTY:</span>
                        <span class="card-value">${escapeHtml(device.tty_name)}</span>
                    </div>
                </div>
                <div class="card-footer">
                    <a class="btn-monitor" href="/device.html?tty=${encodeURIComponent(device.tty_name)}">Ver monitor</a>
                </div>
            `;
            return card;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function renderDevices(devices) {
            const container = document.getElementById('cards-container');
            const emptyState = document.getElementById('empty-state');

            container.innerHTML = '';

            if (!devices || devices.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            devices.forEach(function(device) {
                container.appendChild(buildCard(device));
            });
        }

        function fetchDevices() {
            fetch('/api/devices')
                .then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function(data) {
                    renderDevices(data);
                })
                .catch(function(err) {
                    console.error('Error al obtener dispositivos:', err);
                });
        }

        fetchDevices();
        setInterval(fetchDevices, 5000);
    </script>
</body>
</html>
