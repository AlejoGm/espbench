<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench — monitor</title>
    <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
    <header>
        <h1>espbench — monitor</h1>
    </header>

    <a class="back-link" href="/dashboard/index.html">← volver</a>

    <h2 id="device-heading">Dispositivo: —</h2>

    <pre id="terminal" class="terminal">Conectando...</pre>

    <script>
        var params = new URLSearchParams(window.location.search);
        var tty = params.get('tty') || '';

        if (tty) {
            document.getElementById('device-heading').textContent = 'Dispositivo: ' + tty;
            document.title = 'espbench — monitor — ' + tty;
        } else {
            document.getElementById('device-heading').textContent = 'Dispositivo: desconocido';
            document.getElementById('terminal').textContent = 'No se especificó dispositivo (parámetro ?tty= faltante).';
        }

        // Terminal output will be wired in #13
    </script>
</body>
</html>
