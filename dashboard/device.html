<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench — monitor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>espbench — monitor</h1>
        <a class="back-link" href="/">← volver</a>
        <span id="device-heading">—</span>
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Conectando...</span>
    </header>

    <pre id="terminal" class="terminal"></pre>

    <script>
        var params = new URLSearchParams(window.location.search);
        var tty = params.get('tty') || '';
        var terminal = document.getElementById('terminal');
        var statusDot = document.getElementById('status-dot');
        var statusLabel = document.getElementById('status-label');
        var ws = null;
        var reconnectTimer = null;

        if (!tty) {
            terminal.textContent = 'Error: parámetro ?tty= faltante.';
        } else {
            document.getElementById('device-heading').textContent = tty;
            document.title = 'espbench — monitor — ' + tty;

            fetch('/api/device/' + tty)
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(d) {
                    if (d && d.chip_id) {
                        document.getElementById('device-heading').textContent = tty + ' (' + d.chip_id + ')';
                    }
                })
                .catch(function() {});

            connect();
        }

        function setStatus(state) {
            statusDot.className = 'status-dot ' + state;
            if (state === 'connected')    statusLabel.textContent = 'Conectado';
            if (state === 'reconnecting') statusLabel.textContent = 'Reconectando...';
            if (state === 'error')        statusLabel.textContent = 'Error';
        }

        function isAtBottom() {
            return terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 50;
        }

        function appendText(text) {
            var atBottom = isAtBottom();
            terminal.textContent += text;
            if (atBottom) {
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        function connect() {
            if (ws) { ws.close(); }
            setStatus('reconnecting');

            var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsUrl = wsProto + '//' + location.host + '/ws/device/' + tty;
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                setStatus('connected');
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onmessage = function(evt) {
                appendText(evt.data);
            };

            ws.onclose = function() {
                setStatus('reconnecting');
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = function() {
                setStatus('error');
                ws.close();
            };
        }
    </script>
</body>
</html>
