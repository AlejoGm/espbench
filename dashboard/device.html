<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench — monitor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>espbench — monitor</h1>
        <a class="back-link" href="/">← volver</a>
        <span id="device-heading">—</span>
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Conectando...</span>
    </header>

    <pre id="terminal" class="terminal"></pre>

    <script>
        var params = new URLSearchParams(window.location.search);
        var tty = params.get('tty') || '';
        var terminal = document.getElementById('terminal');
        var statusDot = document.getElementById('status-dot');
        var statusLabel = document.getElementById('status-label');
        var ws = null;
        var reconnectTimer = null;
        var rawContent = '';

        // ── ANSI → HTML ───────────────────────────────────────────────────────
        var ANSI_COLORS = {
            30: '#555555', 31: '#cd3131', 32: '#0dbc79', 33: '#e5e510',
            34: '#2472c8', 35: '#bc3fbc', 36: '#11a8cd', 37: '#e5e5e5',
            90: '#777777', 91: '#f14c4c', 92: '#23d18b', 93: '#f5f543',
            94: '#3b8eea', 95: '#d670d6', 96: '#29b8db', 97: '#ffffff',
        };

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function ansiToHtml(text) {
            // Normalizar saltos de línea — \r\n y \r suelto → \n
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            var result = '';
            var openSpan = false;
            // Split en secuencias ESC[...m; partes pares = texto, impares = códigos
            var parts = text.split(/\x1b\[([0-9;]*)m/);

            for (var i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    result += escHtml(parts[i]);
                } else {
                    if (openSpan) { result += '</span>'; openSpan = false; }
                    var codes = parts[i] === '' ? [0] : parts[i].split(';').map(Number);
                    var style = '';
                    for (var j = 0; j < codes.length; j++) {
                        var c = codes[j];
                        if (c === 0) { style = ''; }
                        else if (c === 1) { style += 'font-weight:bold;'; }
                        else if (ANSI_COLORS[c]) { style += 'color:' + ANSI_COLORS[c] + ';'; }
                    }
                    if (style) { result += '<span style="' + style + '">'; openSpan = true; }
                }
            }
            if (openSpan) result += '</span>';
            return result;
        }

        // ── Terminal rendering ────────────────────────────────────────────────
        function appendText(text) {
            var atBottom = isAtBottom();
            rawContent += text;
            terminal.innerHTML = ansiToHtml(rawContent);
            if (atBottom) {
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        function isAtBottom() {
            return terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 50;
        }

        // ── Init ──────────────────────────────────────────────────────────────
        if (!tty) {
            terminal.textContent = 'Error: parámetro ?tty= faltante.';
        } else {
            document.getElementById('device-heading').textContent = tty;
            document.title = 'espbench — monitor — ' + tty;

            fetch('/api/device/' + tty)
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(d) {
                    if (d && d.chip_id) {
                        document.getElementById('device-heading').textContent = tty + ' (' + d.chip_id + ')';
                    }
                })
                .catch(function() {});

            connect();
        }

        function setStatus(state) {
            statusDot.className = 'status-dot ' + state;
            if (state === 'connected')    statusLabel.textContent = 'Conectado';
            if (state === 'reconnecting') statusLabel.textContent = 'Reconectando...';
            if (state === 'error')        statusLabel.textContent = 'Error';
        }

        function connect() {
            if (ws) { ws.close(); }
            setStatus('reconnecting');

            var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsUrl = wsProto + '//' + location.host + '/ws/device/' + tty;
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                setStatus('connected');
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onmessage = function(evt) {
                appendText(evt.data);
            };

            ws.onclose = function() {
                setStatus('reconnecting');
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = function() {
                setStatus('error');
                ws.close();
            };
        }
    </script>
</body>
</html>
