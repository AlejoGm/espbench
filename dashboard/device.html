<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench — monitor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="device-page">

    <div class="device-header">
        <a class="back-link" href="/">← inicio</a>
        <span class="separator">/</span>
        <span class="device-name" id="device-name">—</span>
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-label">Conectando...</span>
    </div>

    <pre id="terminal" class="terminal"></pre>

    <script>
        var params = new URLSearchParams(window.location.search);
        var tty = params.get('tty') || '';
        var terminal = document.getElementById('terminal');
        var statusDot = document.getElementById('status-dot');
        var statusLabel = document.getElementById('status-label');
        var deviceName = document.getElementById('device-name');
        var ws = null;
        var reconnectTimer = null;
        var rawContent = '';

        // ── ANSI → HTML ───────────────────────────────────────────────────────
        var ANSI_COLORS = {
            30: '#555555', 31: '#f85149', 32: '#3fb950', 33: '#d29922',
            34: '#388bfd', 35: '#bc8cff', 36: '#39c5cf', 37: '#b1bac4',
            90: '#6e7681', 91: '#ff7b72', 92: '#56d364', 93: '#e3b341',
            94: '#79c0ff', 95: '#d2a8ff', 96: '#56d4dd', 97: '#f0f6fc',
        };

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // \r* antes de \n = la PTY (ONLCR) generó CRs extra — colapsar a \n.
        // \r suelto (sin \n a continuación) = overwrite terminal — quedarse con el
        // texto posterior al último \r en esa línea (esptool progress bars).
        function applyCarriageReturns(text) {
            text = text.replace(/\r*\n/g, '\n');
            return text.split('\n').map(function(line) {
                var idx = line.lastIndexOf('\r');
                return idx >= 0 ? line.slice(idx + 1) : line;
            }).join('\n');
        }

        function ansiToHtml(text) {
            text = applyCarriageReturns(text);
            var result = '';
            var openSpan = false;
            var parts = text.split(/\x1b\[([0-9;]*)m/);
            for (var i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    result += escHtml(parts[i]);
                } else {
                    if (openSpan) { result += '</span>'; openSpan = false; }
                    var codes = parts[i] === '' ? [0] : parts[i].split(';').map(Number);
                    var style = '';
                    for (var j = 0; j < codes.length; j++) {
                        var c = codes[j];
                        if (c === 0) { style = ''; }
                        else if (c === 1) { style += 'font-weight:600;'; }
                        else if (ANSI_COLORS[c]) { style += 'color:' + ANSI_COLORS[c] + ';'; }
                    }
                    if (style) { result += '<span style="' + style + '">'; openSpan = true; }
                }
            }
            if (openSpan) result += '</span>';
            return result;
        }

        // ── Terminal rendering ────────────────────────────────────────────────
        function appendText(text) {
            var atBottom = isAtBottom();
            rawContent += text;
            terminal.innerHTML = ansiToHtml(rawContent);
            if (atBottom) terminal.scrollTop = terminal.scrollHeight;
        }

        function isAtBottom() {
            return terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 50;
        }

        // ── Init ──────────────────────────────────────────────────────────────
        if (!tty) {
            terminal.textContent = 'Error: parámetro ?tty= faltante.';
        } else {
            deviceName.textContent = tty;
            document.title = 'espbench — ' + tty;

            connect();
        }

        function setStatus(state) {
            statusDot.className = 'status-dot ' + state;
            if (state === 'connected')    statusLabel.textContent = 'conectado';
            if (state === 'reconnecting') statusLabel.textContent = 'reconectando...';
            if (state === 'error')        statusLabel.textContent = 'error';
        }

        function connect() {
            if (ws) { ws.close(); }
            setStatus('reconnecting');
            var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(wsProto + '//' + location.host + '/ws/device/' + tty);
            ws.onopen = function() {
                setStatus('connected');
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };
            ws.onmessage = function(evt) { appendText(evt.data); };
            ws.onclose   = function() {
                setStatus('reconnecting');
                reconnectTimer = setTimeout(connect, 2000);
            };
            ws.onerror   = function() { setStatus('error'); ws.close(); };
        }
    </script>
</body>
</html>
