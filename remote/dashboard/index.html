<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>espbench</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="home-header">
        <h1>espbench <span id="version-badge" class="version-badge"></span></h1>
    </header>

    <main>
        <div id="cards-known" class="cards-grid"></div>
        <div id="cards-unknown-wrap" class="hidden">
            <div class="section-label">Sin identificar</div>
            <div id="cards-unknown" class="cards-grid"></div>
        </div>
        <div id="empty-state" class="empty-state hidden">No hay dispositivos conectados</div>
    </main>

    <script>
        function formatTimestamp(iso) {
            if (!iso) return 'Nunca';
            return iso.replace('T', ' ');
        }

        function escapeHtml(str) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        function buildCard(device) {
            var statusClass = device.status === 'RUNNING' ? 'badge-running' : 'badge-down';
            var lastFlash = formatTimestamp(device.last_flash_ts);
            var title = device.device_key || device.tty_name;
            var tty = escapeHtml(device.tty_name);

            var card = document.createElement('div');
            card.className = 'device-card' + (device.lock_user ? ' locked' : '');

            var hwModelRow = device.hw_model
                ? '<div class="card-row"><span class="card-label">HW Model:</span><span class="card-value">' + escapeHtml(device.hw_model) + '</span></div>'
                : '';
            var versionRow = device.fw_version
                ? '<div class="card-row"><span class="card-label">App version:</span><span class="card-value">' + escapeHtml(device.fw_version) + '</span></div>'
                : '';
            var idfRow = device.fw_idf
                ? '<div class="card-row"><span class="card-label">ESP-IDF:</span><span class="card-value">' + escapeHtml(device.fw_idf) + '</span></div>'
                : '';
            var deployerRow = device.last_flash_user
                ? '<div class="card-row"><span class="card-label">Deployer:</span><span class="card-value">' + escapeHtml(device.last_flash_user) + '</span></div>'
                : '';
            var snRow = device.sn
                ? '<div class="card-row"><span class="card-label">SN:</span><span class="card-value">' + escapeHtml(device.sn) + '</span></div>'
                : '';
            var ttyRow = '<div class="card-row"><span class="card-label">TTY:</span><span class="card-value">' + escapeHtml(device.tty_name) + '</span></div>';

            var renameHtml = device.mac
                ? '<button class="rename-btn" id="rename-btn-' + tty + '" title="Renombrar">✎</button>' +
                  '<input class="rename-input hidden" id="rename-input-' + tty + '" value="' + escapeHtml(title) + '" />' +
                  '<button class="rename-ok hidden" id="rename-ok-' + tty + '" title="Confirmar">✓</button>' +
                  '<button class="rename-cancel hidden" id="rename-cancel-' + tty + '" title="Cancelar">✗</button>'
                : '';

            card.innerHTML =
                '<div class="card-header">' +
                    '<div class="card-title-wrap">' +
                        '<span class="card-title" id="key-label-' + tty + '">' + escapeHtml(title) + '</span>' +
                        renameHtml +
                    '</div>' +
                    '<div class="card-header-badges">' +
                        (device.lock_user ? '<span class="badge badge-locked">&#128274; ' + escapeHtml(device.lock_user) + '</span>' : '') +
                        '<span class="badge ' + statusClass + '">' + escapeHtml(device.status) + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="card-body">' +
                    hwModelRow + versionRow + idfRow + deployerRow + snRow + ttyRow +
                    '<div class="card-row"><span class="card-label">Último flash:</span><span class="card-value">' + escapeHtml(lastFlash) + '</span></div>' +
                    '<div class="card-row"><span class="card-label">Puerto TCP:</span><span class="card-value">' + escapeHtml(String(device.port_tcp)) + '</span></div>' +
                '</div>' +
                '<div class="card-footer">' +
                    '<a class="btn-monitor" href="/device.html?tty=' + encodeURIComponent(device.tty_name) + '">Ver monitor</a>' +
                '</div>';

            if (device.mac) {
                var ttyName = device.tty_name;
                var mac = device.mac;
                card.querySelector('.rename-btn').addEventListener('click', function() {
                    startRename(ttyName, mac, title);
                });
                card.querySelector('.rename-ok').addEventListener('click', function() {
                    submitRename(ttyName, mac);
                });
                card.querySelector('.rename-cancel').addEventListener('click', function() {
                    cancelRename(ttyName);
                });
            }

            return card;
        }

        function startRename(ttyName, mac, currentKey) {
            var label  = document.getElementById('key-label-'    + ttyName);
            var btn    = document.getElementById('rename-btn-'   + ttyName);
            var inp    = document.getElementById('rename-input-' + ttyName);
            var ok     = document.getElementById('rename-ok-'    + ttyName);
            var cancel = document.getElementById('rename-cancel-' + ttyName);
            if (!inp) return;

            label.classList.add('hidden');
            btn.classList.add('hidden');
            inp.classList.remove('hidden');
            ok.classList.remove('hidden');
            cancel.classList.remove('hidden');

            inp.value = currentKey;
            inp.focus();
            inp.select();
            inp.onkeydown = function(e) {
                if (e.key === 'Enter')  submitRename(ttyName, mac);
                if (e.key === 'Escape') cancelRename(ttyName);
            };
        }

        function cancelRename(ttyName) {
            var label  = document.getElementById('key-label-'     + ttyName);
            var btn    = document.getElementById('rename-btn-'    + ttyName);
            var inp    = document.getElementById('rename-input-'  + ttyName);
            var ok     = document.getElementById('rename-ok-'     + ttyName);
            var cancel = document.getElementById('rename-cancel-' + ttyName);
            if (!inp) return;

            inp.classList.add('hidden');
            ok.classList.add('hidden');
            cancel.classList.add('hidden');
            label.classList.remove('hidden');
            btn.classList.remove('hidden');
        }

        function submitRename(ttyName, mac) {
            var inp = document.getElementById('rename-input-' + ttyName);
            if (!inp) return;
            var newKey = inp.value.trim();
            if (!newKey) return;

            fetch('/api/devices/' + mac, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({device_key: newKey})
            }).then(function(r) { return r.json(); })
              .then(function(d) {
                  if (d.ok) {
                      fetchDevices();
                  } else {
                      alert('Error al renombrar');
                  }
              })
              .catch(function() { alert('Error de conexión'); });
        }

        function buildUnknownCard(device) {
            var statusClass = device.status === 'RUNNING' ? 'badge-running' : 'badge-down';
            var tty = escapeHtml(device.tty_name);

            var card = document.createElement('div');
            card.className = 'device-card card-unknown';

            var snRow = device.sn
                ? '<div class="card-row"><span class="card-label">SN:</span><span class="card-value">' + escapeHtml(device.sn) + '</span></div>'
                : '';

            card.innerHTML =
                '<div class="card-header">' +
                    '<div class="card-title-wrap">' +
                        '<span class="card-title card-title-dim">' + escapeHtml(device.tty_name) + '</span>' +
                    '</div>' +
                    '<div class="card-header-badges">' +
                        '<span class="badge ' + statusClass + '">' + escapeHtml(device.status) + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="card-body">' +
                    snRow +
                    '<div class="card-row"><span class="card-label">Puerto TCP:</span><span class="card-value">' + escapeHtml(String(device.port_tcp)) + '</span></div>' +
                '</div>' +
                '<div class="card-footer">' +
                    '<a class="btn-monitor" href="/device.html?tty=' + encodeURIComponent(device.tty_name) + '">Ver monitor</a>' +
                '</div>';

            return card;
        }

        function renderDevices(devices) {
            var known       = document.getElementById('cards-known');
            var unknown     = document.getElementById('cards-unknown');
            var unknownWrap = document.getElementById('cards-unknown-wrap');
            var emptyState  = document.getElementById('empty-state');

            known.innerHTML   = '';
            unknown.innerHTML = '';

            if (!devices || devices.length === 0) {
                emptyState.classList.remove('hidden');
                unknownWrap.classList.add('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            var hasUnknown = false;
            devices.forEach(function(device) {
                if (device.mac) {
                    known.appendChild(buildCard(device));
                } else {
                    unknown.appendChild(buildUnknownCard(device));
                    hasUnknown = true;
                }
            });
            unknownWrap.classList.toggle('hidden', !hasUnknown);
        }

        function fetchDevices() {
            fetch('/api/devices')
                .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(renderDevices)
                .catch(function(err) { console.error('Error:', err); });
        }

        fetch('/api/version')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var el = document.getElementById('version-badge');
                if (el && d.version) el.textContent = 'v' + d.version;
            })
            .catch(function() {});

        fetchDevices();
        setInterval(fetchDevices, 5000);
    </script>
</body>
</html>
